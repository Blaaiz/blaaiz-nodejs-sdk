name: CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  release:
    types: [ published ]

jobs:
  test:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        node-version: [16.x, 18.x, 20.x, 21.x]

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm install
    
    - name: Lint with ESLint
      run: npm run lint
    
    - name: Run tests
      run: npm test

    - name: Run build
      run: npm run build
    
    - name: Generate coverage report
      run: npm run test:coverage
      if: matrix.node-version == '18.x'
      continue-on-error: true
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage/lcov.info
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
      if: matrix.node-version == '18.x'

  integration-test:
    runs-on: ubuntu-22.04
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18.x'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm install
    
    - name: Run integration tests
      env:
        BLAAIZ_API_KEY: ${{ secrets.BLAAIZ_API_KEY }}
        BLAAIZ_WEBHOOK_SECRET: ${{ secrets.BLAAIZ_WEBHOOK_SECRET }}
      run: |
        npm run test:integration
      if: env.BLAAIZ_API_KEY != ''

  security-audit:
    runs-on: ubuntu-22.04
    needs: test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18.x'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm install
    
    - name: Run security audit
      run: npm audit --audit-level=moderate
    
    - name: Check for vulnerabilities
      run: npx audit-ci --moderate

  build:
    runs-on: ubuntu-22.04
    needs: test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18.x'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm install
    
    - name: Build package
      run: npm run build
    
    - name: Pack package
      run: npm pack
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: npm-package
        path: "*.tgz"

  publish:
    runs-on: ubuntu-22.04
    needs: [test, security-audit, build]
    if: github.event_name == 'release' && github.event.action == 'published'
    permissions:
      id-token: write
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22.x'
        cache: 'npm'
        # Intentionally no registry-url: setup-node would otherwise write
        # an .npmrc with `_authToken=${NODE_AUTH_TOKEN}` and export a
        # placeholder NODE_AUTH_TOKEN, which makes npm publish via the
        # token path and skip the OIDC handshake.

    - name: Install dependencies
      run: npm install

    - name: Build package
      run: npm run build

    - name: Publish to npm
      env:
        BLAAIZ_API_KEY: ${{ secrets.BLAAIZ_API_KEY }}
        BLAAIZ_WEBHOOK_SECRET: ${{ secrets.BLAAIZ_WEBHOOK_SECRET }}
      # Node 22's bundled npm is 10.x, which predates OIDC trusted
      # publishing. Run the publish through `npx npm@11` so we are
      # guaranteed to be on a CLI that knows how to do the OIDC
      # handshake, regardless of PATH/globals.
      run: npx --yes npm@11 publish --access public

  publish-dry-run:
    runs-on: ubuntu-22.04
    needs: [test, security-audit, build]
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18.x'
        cache: 'npm'
        registry-url: 'https://registry.npmjs.org'
    
    - name: Install dependencies
      run: npm install
    
    - name: Build package
      run: npm run build
    
    - name: Dry run publish
      run: npm publish --dry-run --access public